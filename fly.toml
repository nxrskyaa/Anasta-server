app = "anasta-server"
primary_region = "sin"  # Singapore (closest to ID). Change if needed.
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  builder = "nodejs"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 2567
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
